<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MedAgenda - Agendar Consulta</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
    <link href="css/style.css" rel="stylesheet">
</head>
<body>

    <!-- Navbar -->
    <nav class="navbar navbar-expand-lg">
        <div class="container">
            <a class="navbar-brand" href="dashboard.html">
                <i class="bi bi-heart-pulse me-2"></i>MedAgenda
            </a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item">
                        <a class="nav-link" href="dashboard.html">
                            <i class="bi bi-speedometer2 me-1"></i>Painel
                        </a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link active" href="agendar.html">
                            <i class="bi bi-calendar-plus me-1"></i>Agendar
                        </a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="perfil.html">
                            <i class="bi bi-person me-1"></i>Perfil
                        </a>
                    </li>
                    <li class="nav-item">
                        <button class="nav-link btn btn-link" id="btnLogout">
                            <i class="bi bi-box-arrow-right me-1"></i>Sair
                        </button>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <!-- Agendar Content -->
    <section class="container py-4">
        <div class="row justify-content-center">
            <div class="col-lg-7">
                <div class="card">
                    <div class="card-header py-3">
                        <h4 class="mb-0 fw-bold">
                            <i class="bi bi-calendar-plus me-2"></i>Agendar Nova Consulta
                        </h4>
                    </div>
                    <div class="card-body p-4">
                        <form id="formAgendar">
                            <!-- Médico -->
                            <div class="mb-4">
                                <label for="selectMedico" class="form-label">
                                    <i class="bi bi-person-badge me-1"></i>Selecionar Médico
                                </label>
                                <select class="form-select" id="selectMedico" required>
                                    <option value="">Escolha um médico...</option>
                                </select>
                            </div>

                            <!-- Data e Hora -->
                            <div class="row g-3 mb-4">
                                <div class="col-md-6">
                                    <label for="inputData" class="form-label">
                                        <i class="bi bi-calendar me-1"></i>Data da Consulta
                                    </label>
                                    <input type="date" class="form-control" id="inputData" required>
                                </div>
                                <div class="col-md-6">
                                    <label for="selectHora" class="form-label">
                                        <i class="bi bi-clock me-1"></i>Hora da Consulta
                                    </label>
                                    <select class="form-select" id="selectHora" required>
                                        <option value="">Escolha a hora...</option>
                                        <option value="08:00">08:00</option>
                                        <option value="08:30">08:30</option>
                                        <option value="09:00">09:00</option>
                                        <option value="09:30">09:30</option>
                                        <option value="10:00">10:00</option>
                                        <option value="10:30">10:30</option>
                                        <option value="11:00">11:00</option>
                                        <option value="11:30">11:30</option>
                                        <option value="14:00">14:00</option>
                                        <option value="14:30">14:30</option>
                                        <option value="15:00">15:00</option>
                                        <option value="15:30">15:30</option>
                                        <option value="16:00">16:00</option>
                                        <option value="16:30">16:30</option>
                                        <option value="17:00">17:00</option>
                                    </select>
                                </div>
                            </div>

                            <!-- Tipo de Consulta -->
                            <div class="mb-4">
                                <label for="selectTipo" class="form-label">
                                    <i class="bi bi-clipboard-pulse me-1"></i>Tipo de Consulta
                                </label>
                                <select class="form-select" id="selectTipo" required>
                                    <option value="">Escolha o tipo...</option>
                                    <option value="Geral">Consulta Geral</option>
                                    <option value="Especialidade">Especialidade</option>
                                    <option value="Urgência">Urgência</option>
                                    <option value="Exame">Exame</option>
                                </select>
                            </div>

                            <!-- Notas -->
                            <div class="mb-4">
                                <label for="inputNotas" class="form-label">
                                    <i class="bi bi-journal-text me-1"></i>Notas (opcional)
                                </label>
                                <textarea class="form-control" id="inputNotas" rows="3" placeholder="Descreva brevemente o motivo da consulta ou outras informações relevantes..."></textarea>
                            </div>

                            <!-- Alertas -->
                            <div id="agendarError" class="alert alert-danger d-none mb-3"></div>
                            <div id="agendarSuccess" class="alert alert-success d-none mb-3"></div>

                            <!-- Botões -->
                            <div class="d-flex gap-3">
                                <button type="submit" class="btn btn-primary btn-lg flex-grow-1">
                                    <i class="bi bi-calendar-check me-2"></i>Agendar Consulta
                                </button>
                                <a href="dashboard.html" class="btn btn-outline-secondary btn-lg">
                                    <i class="bi bi-arrow-left me-1"></i>Voltar
                                </a>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </section>

    <!-- Footer -->
    <footer class="text-center">
        <small>&copy; 2026 MedAgenda - Sistema de Agendamento de Consultas</small>
    </footer>

    <!-- Acesso discreto para médicos -->
    <a href="medico.html" class="btn-medico" title="Área do Médico">
        <i class="bi bi-shield-lock"></i>
    </a>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="js/supabase-config.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/consultas.js"></script>
    <script src="js/agendar.js"></script>
</body>
</html>
