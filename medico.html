<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MedAgenda - Área do Médico</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
    <link href="css/style.css" rel="stylesheet">
</head>
<body>

    <!-- Navbar -->
    <nav class="navbar navbar-expand-lg">
        <div class="container">
            <a class="navbar-brand" href="medico.html">
                <i class="bi bi-heart-pulse me-2"></i>MedAgenda
            </a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto" id="navMedico" style="display:none;">
                    <li class="nav-item">
                        <span class="nav-link active" id="navMedicoNome">
                            <i class="bi bi-person-badge me-1"></i><span id="medicoName">Médico</span>
                        </span>
                    </li>
                    <li class="nav-item">
                        <button class="nav-link btn btn-link" id="btnLogoutMedico">
                            <i class="bi bi-box-arrow-right me-1"></i>Sair
                        </button>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <!-- Login Section -->
    <section id="loginSection" class="container py-5">
        <div class="row justify-content-center">
            <div class="col-md-6 col-lg-4">
                <div class="card">
                    <div class="card-body p-4 p-md-5">
                        <div class="text-center mb-4">
                            <div style="width:70px;height:70px;border-radius:50%;background:var(--primary-light);color:var(--primary);display:flex;align-items:center;justify-content:center;font-size:2rem;margin:0 auto 1rem;">
                                <i class="bi bi-person-badge"></i>
                            </div>
                            <h4 class="fw-bold">Área do Médico</h4>
                            <p style="color:var(--gray-500);font-size:0.9rem;">Aceda à sua conta para gerir consultas</p>
                        </div>
                        <form id="formLoginMedico">
                            <div class="mb-3">
                                <label for="selectMedicoLogin" class="form-label">Selecione o seu nome</label>
                                <select class="form-select" id="selectMedicoLogin" required>
                                    <option value="">Escolha...</option>
                                </select>
                            </div>
                            <div class="mb-4">
                                <label for="inputSenha" class="form-label">Senha de acesso</label>
                                <input type="password" class="form-control" id="inputSenha" placeholder="Digite a sua senha" required>
                            </div>
                            <div id="loginMedicoError" class="alert alert-danger d-none mb-3"></div>
                            <button type="submit" class="btn btn-primary w-100 btn-lg">
                                <i class="bi bi-box-arrow-in-right me-2"></i>Entrar
                            </button>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </section>

    <!-- Dashboard Section (hidden until login) -->
    <section id="dashboardSection" class="container py-4" style="display:none;">
        <!-- Stats -->
        <div class="row g-3 mb-4">
            <div class="col-md-4">
                <div class="card h-100">
                    <div class="card-body text-center p-4">
                        <div class="stat-icon agendadas mx-auto mb-3">
                            <i class="bi bi-calendar-check fs-4"></i>
                        </div>
                        <h3 class="fw-bold mb-1" id="statHoje">0</h3>
                        <p style="color:var(--gray-500);" class="mb-0">Consultas Hoje</p>
                    </div>
                </div>
            </div>
            <div class="col-md-4">
                <div class="card h-100">
                    <div class="card-body text-center p-4">
                        <div class="stat-icon concluidas mx-auto mb-3">
                            <i class="bi bi-clock-history fs-4"></i>
                        </div>
                        <h3 class="fw-bold mb-1" id="statProximas">0</h3>
                        <p style="color:var(--gray-500);" class="mb-0">Próximas</p>
                    </div>
                </div>
            </div>
            <div class="col-md-4">
                <div class="card h-100">
                    <div class="card-body text-center p-4">
                        <div class="stat-icon canceladas mx-auto mb-3">
                            <i class="bi bi-check-circle fs-4"></i>
                        </div>
                        <h3 class="fw-bold mb-1" id="statTotal">0</h3>
                        <p style="color:var(--gray-500);" class="mb-0">Total</p>
                    </div>
                </div>
            </div>
        </div>

        <!-- Filtros -->
        <div class="card mb-4">
            <div class="card-header py-3">
                <div class="d-flex justify-content-between align-items-center flex-wrap gap-3">
                    <h5 class="mb-0 fw-bold">
                        <i class="bi bi-calendar3 me-2"></i>As Minhas Consultas
                    </h5>
                    <div class="btn-group" role="group">
                        <button class="btn btn-outline-primary btn-sm active" data-filter="todas">Todas</button>
                        <button class="btn btn-outline-primary btn-sm" data-filter="hoje">Hoje</button>
                        <button class="btn btn-outline-primary btn-sm" data-filter="agendada">Agendadas</button>
                        <button class="btn btn-outline-primary btn-sm" data-filter="concluída">Concluídas</button>
                    </div>
                </div>
            </div>
            <div class="card-body p-0">
                <div class="table-responsive">
                    <table class="table table-hover mb-0">
                        <thead>
                            <tr>
                                <th>Paciente</th>
                                <th>Email</th>
                                <th>Telefone</th>
                                <th>Data</th>
                                <th>Hora</th>
                                <th>Tipo</th>
                                <th>Estado</th>
                                <th>Ações</th>
                            </tr>
                        </thead>
                        <tbody id="consultasMedicoTable">
                            <tr>
                                <td colspan="8" class="text-center py-5" style="color:var(--gray-500);">
                                    <i class="bi bi-calendar-x fs-1 d-block mb-2"></i>
                                    Ainda não tem consultas agendadas
                                </td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>

        <!-- Spinner -->
        <div id="loadingMedico" class="text-center py-5">
            <div class="spinner-border" role="status">
                <span class="visually-hidden">A carregar...</span>
            </div>
        </div>
    </section>

    <!-- Footer -->
    <footer class="text-center">
        <small>&copy; 2026 MedAgenda - Sistema de Agendamento de Consultas</small>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="js/supabase-config.js"></script>
    <script src="js/consultas.js"></script>
    <script src="js/medico.js"></script>
</body>
</html>
