<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MedAgenda - O Meu Perfil</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
    <link href="css/style.css" rel="stylesheet">
</head>
<body class="bg-light">

    <!-- Navbar -->
    <nav class="navbar navbar-expand-lg navbar-dark bg-primary">
        <div class="container">
            <a class="navbar-brand fw-bold" href="dashboard.html">
                <img src="images/logo.svg" alt="MedAgenda" width="30" height="30" class="me-2">
                MedAgenda
            </a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item">
                        <a class="nav-link" href="dashboard.html">
                            <i class="bi bi-speedometer2 me-1"></i>Painel
                        </a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="agendar.html">
                            <i class="bi bi-calendar-plus me-1"></i>Agendar
                        </a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link active" href="perfil.html">
                            <i class="bi bi-person me-1"></i>Perfil
                        </a>
                    </li>
                    <li class="nav-item">
                        <button class="nav-link btn btn-link" id="btnLogout">
                            <i class="bi bi-box-arrow-right me-1"></i>Sair
                        </button>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <!-- Perfil Content -->
    <section class="container py-4">
        <div class="row justify-content-center">
            <div class="col-lg-8">
                <!-- Profile Card -->
                <div class="card border-0 shadow-sm mb-4">
                    <div class="card-body p-4 text-center">
                        <div class="profile-avatar mx-auto mb-3">
                            <i class="bi bi-person-fill"></i>
                        </div>
                        <h4 id="perfilNome" class="fw-bold mb-1">Nome do Utilizador</h4>
                        <p id="perfilEmail" class="text-muted mb-0">email@exemplo.com</p>
                    </div>
                </div>

                <!-- Edit Profile -->
                <div class="card border-0 shadow-sm">
                    <div class="card-header bg-white border-0 py-3">
                        <h5 class="mb-0 fw-bold">
                            <i class="bi bi-pencil-square me-2 text-primary"></i>Editar Perfil
                        </h5>
                    </div>
                    <div class="card-body p-4">
                        <form id="formPerfil">
                            <div class="mb-3">
                                <label for="perfilNomeInput" class="form-label fw-semibold">Nome Completo</label>
                                <input type="text" class="form-control form-control-lg" id="perfilNomeInput" required>
                            </div>
                            <div class="mb-3">
                                <label for="perfilTelefone" class="form-label fw-semibold">Telefone</label>
                                <input type="tel" class="form-control form-control-lg" id="perfilTelefone">
                            </div>
                            <div id="perfilError" class="alert alert-danger d-none"></div>
                            <div id="perfilSuccess" class="alert alert-success d-none"></div>
                            <button type="submit" class="btn btn-primary btn-lg">
                                <i class="bi bi-check-lg me-2"></i>Guardar Alterações
                            </button>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </section>

    <!-- Footer -->
    <footer class="bg-dark text-white text-center py-3 mt-4">
        <small>2026 MedAgenda - Sistema de Agendamento de Consultas</small>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="js/supabase-config.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/perfil.js"></script>
</body>
</html>
