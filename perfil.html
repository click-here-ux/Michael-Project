<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MedAgenda - O Meu Perfil</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
    <link href="css/style.css" rel="stylesheet">
</head>
<body>

    <!-- Navbar -->
    <nav class="navbar navbar-expand-lg">
        <div class="container">
            <a class="navbar-brand" href="dashboard.html">
                <i class="bi bi-heart-pulse me-2"></i>MedAgenda
            </a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item">
                        <a class="nav-link" href="dashboard.html">
                            <i class="bi bi-speedometer2 me-1"></i>Painel
                        </a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="agendar.html">
                            <i class="bi bi-calendar-plus me-1"></i>Agendar
                        </a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link active" href="perfil.html">
                            <i class="bi bi-person me-1"></i>Perfil
                        </a>
                    </li>
                    <li class="nav-item">
                        <button class="nav-link btn btn-link" id="btnLogout">
                            <i class="bi bi-box-arrow-right me-1"></i>Sair
                        </button>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <!-- Perfil Content -->
    <section class="container py-4">
        <div class="row justify-content-center">
            <div class="col-lg-7">
                <!-- Profile Card -->
                <div class="card mb-4">
                    <div class="card-body p-5 text-center">
                        <div class="profile-avatar mb-4">
                            <i class="bi bi-person-fill"></i>
                        </div>
                        <h4 id="perfilNome" class="fw-bold mb-1">Nome do Utilizador</h4>
                        <p id="perfilEmail" style="color: var(--gray-500);" class="mb-0">email@exemplo.com</p>
                    </div>
                </div>

                <!-- Edit Profile -->
                <div class="card">
                    <div class="card-header py-3">
                        <h5 class="mb-0 fw-bold">
                            <i class="bi bi-pencil-square me-2"></i>Editar Perfil
                        </h5>
                    </div>
                    <div class="card-body p-4">
                        <form id="formPerfil">
                            <div class="mb-3">
                                <label for="perfilNomeInput" class="form-label">Nome Completo</label>
                                <input type="text" class="form-control" id="perfilNomeInput" required>
                            </div>
                            <div class="mb-4">
                                <label for="perfilTelefone" class="form-label">Telefone</label>
                                <input type="tel" class="form-control" id="perfilTelefone">
                            </div>
                            <div id="perfilError" class="alert alert-danger d-none mb-3"></div>
                            <div id="perfilSuccess" class="alert alert-success d-none mb-3"></div>
                            <button type="submit" class="btn btn-primary btn-lg">
                                <i class="bi bi-check-lg me-2"></i>Guardar Alterações
                            </button>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </section>

    <!-- Footer -->
    <footer class="text-center">
        <small>&copy; 2026 MedAgenda - Sistema de Agendamento de Consultas</small>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="js/supabase-config.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/perfil.js"></script>
</body>
</html>
